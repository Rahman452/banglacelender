<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pro Calendar v6.0</title>
    <style>
        :root {
            --primary: #4834d4;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --current-month-bg: #e3f2fd;
            --other-month-bg: #f8f9fa;
            --text-main: #2d3436;
            --text-muted: #b2bec3;
            --border-color: #d1d8e0;
        }

        .dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --current-month-bg: #2d2d2d;
            --other-month-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #555555;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; transition: 0.3s;
        }

        .calendar-card {
            width: 95%; max-width: 450px; background: var(--bg-card); border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); padding: 20px; position: relative;
        }

        .top-action-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-group { display: flex; gap: 5px; align-items: center; }

        .custom-select {
            padding: 6px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .today-btn {
            background: #00b894;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .menu-container { position: relative; }
        .dots-btn { font-size: 24px; cursor: pointer; padding: 0 5px; color: var(--text-main); }
        
        .dropdown-menu {
            display: none; position: absolute; right: 0; top: 35px; width: 200px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 5000;
        }
        .menu-item { 
            padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; gap: 10px; font-size: 14px; 
        }
        .menu-item:hover { background: var(--current-month-bg); }

        /* নেভিগেশন স্টাইল */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            gap: 10px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 60px;
        }

        .nav-btn {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            color: var(--primary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .nav-group:hover .nav-btn { background: var(--primary); color: white; }
